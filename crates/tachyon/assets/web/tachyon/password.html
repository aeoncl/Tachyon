<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "http://www.w3.org/TR/html4/loose.dtd">
<head>
    <title>Tachyon</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="style.css" />
    <script type="text/javascript" src="jquery-1.10.0.min.js"></script>
    <script type="text/javascript" src="intercooler-1.2.4.min.js"></script>
</head>
<body>
    <div class="header">
        <div class="bg">
            <div class="bg-content">
                <img class="logo" src="img/tachyon_logo_2.png" />
                <div class="title">
                    <h1>Tachyon</h1>
                    <h2>Welcome to Tachyon</h2>
                </div>

                <div class="menu">
                    <ul>
                        <li><a href="#">Home</a></li>
                        <li><a href="#">Profile</a></li>
                        <li><a href="#">People</a></li>
                    </ul>
                </div>

                <div class="signin">
                    <h2>Log-on</h2>
                </div>

            </div>
        </div>
    </div>

    <div class="content">

        <table class="hero-table" cellspacing="0" cellpadding="0" border="0">
            <tr>
                <td class="hero-text" valign="middle">
                    <h2>Password required</h2>
                    <p>Please enter your password to continue</p>
                </td>
            </tr>
        </table>

        <div class="sep"></div>

        <form action="">
            <div id="error-message" style="display:none;"></div>
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>

            <button type="submit" class="btn btn-primary"><span class="btn-shine"></span><span class="btn-label">Continue</span></button>
        </form>

    </div>

</body>
