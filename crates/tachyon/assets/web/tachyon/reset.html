<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "http://www.w3.org/TR/html4/loose.dtd">
<head>
    <title>Tachyon</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="style.css" />
    <script type="text/javascript" src="jquery-1.10.0.min.js"></script>
    <script type="text/javascript" src="intercooler-1.2.4.min.js"></script>
</head>
<body>
    <div class="header">
        <div class="bg">
            <div class="bg-content">
                <img class="logo" src="tachyon_logo_2.png" />
                <div class="title">
                    <h1>Tachyon</h1>
                    <h2>Welcome to Tachyon</h2>
                </div>

                <div class="menu">
                    <ul>
                        <li><a href="#">Home</a></li>
                        <li><a href="#">Profile</a></li>
                        <li><a href="#">People</a></li>
                    </ul>
                </div>

                <div class="signin">
                    <h2>Log-on</h2>
                </div>

            </div>
        </div>
    </div>

    <div class="content">

        <table class="hero-table" cellspacing="0" cellpadding="0" border="0">
            <tr>
                <td class="hero-text" valign="middle">
                    <h2>Reset Cryptographic Identity</h2>
                    <p>Follow the steps to reset your account</p>
                </td>
                <td class="hero-stepper" valign="middle">
                    <!-- Stepper Navigation -->
                    <div class="stepper">
                        <div class="step step-active">
                            <span class="step-number">1</span>
                            <span class="step-label">Confirm Reset</span>
                        </div>
                        <div class="step-connector"></div>
                        <div class="step">
                            <span class="step-number">2</span>
                            <span class="step-label">Setup Backup</span>
                        </div>
                    </div>
                </td>
            </tr>
        </table>

        <div class="sep"></div>

        <!-- Step Content Area (Intercooler will swap this) -->
        <div id="step-content">
            <h3>Confirm Reset</h3>
            <button class="btn btn-danger"><span class="btn-shine"></span><span class="btn-label">Restore device</span></button>            <!-- Step 1 content loaded here initially or via ic-get-from -->
        </div>

    </div>
</body>

</body>
