<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "http://www.w3.org/TR/html4/loose.dtd">
<head>
    <title>Tachyon</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="style.css" />
    <script type="text/javascript" src="jquery-1.10.0.min.js"></script>
    <script type="text/javascript" src="intercooler-1.2.4.min.js"></script>
</head>
<body>
<div class="header">
    <div class="bg">
        <table class="header-table" cellspacing="0" cellpadding="0" border="0">
            <tr>
                <td class="header-logo"><a href="/tachyon"><img class="logo" src="img/tachyon_logo_2.png"
                                                                alt="Tachyon Logo"></a></td>
                <td class="header-title">
                    <h1>Tachyon</h1>
                    <h2>Welcome to Tachyon</h2>
                </td>
                <td class="header-nav">
                    <ul>
                        <li><a href="/tachyon">Home</a></li>
                    </ul>
                </td>
                <td class="header-signin"></td>
            </tr>
        </table>
    </div>
</div>

    <div class="content">

        <table class="hero-table" cellspacing="0" cellpadding="0" border="0">
            <tr>
                <td class="hero-text" valign="middle">
                    <h2>Compare the emojis</h2>
                    <p><b>Check</b> if the <b>emojis</b> showed here <b>match</b> with the ones on the other device.<br>
                    If they do, <i>you're all good.</i> (H)</p>
                </td>
            </tr>
        </table>
        <div class="emoji-container">
        <table class="emoji-table" cellspacing="0" cellpadding="0" border="0">
            <tr>
                <td>
                    <img src="./img/sas_v1/0_dog.gif"/><br>
                    <p>Dog</p>
                </td>
                <td>
                    <img src="./img/sas_v1/1_cat.gif"/>
                    <p>Cat</p>
                </td>
                <td>
                    <img src="./img/sas_v1/58_trumpet.gif"/>
                    <p>Trumpet</p>
                </td>
                <td>
                    <img src="./img/sas_v1/10_penguin.gif"/>
                    <p>Penguin</p>
                </td>
            </tr>
        </table>
            <div class="spacer"></div>
            <table class="emoji-table" cellspacing="0" cellpadding="0" border="0">
                <tr>
                    <td>
                        <img src="./img/sas_v1/30_smiley.gif"/>
                        <p>Smiley</p>
                    </td>
                    <td>
                        <img src="./img/sas_v1/15_flower.gif"/>
                        <p>Flower</p>
                    </td>
                    <td>
                        <img src="./img/sas_v1/20_moon.gif"/>
                        <p>Moon</p>
                    </td>
                </tr>
            </table>
        </div>

        <div class="spacer"></div>
        <div class="emoji-container" >
            <div style="display: block; width: 150px; margin: 0 auto">
                <button type="button" class="btn btn-danger">
                    <span class="btn-shine"></span>
                    <span class="btn-label">Yes</span>
                </button>
                <button type="button" class="btn btn-danger">
                    <span class="btn-shine"></span>
                    <span class="btn-label">Yes</span>
                </button>
            </div>

        </div>

    </div>

</body>
